name: CI Pipeline - Build & Test 0.2

on:
  push:      
    branches: 
      - main
      - dev
    paths:
      - "02-ci-build-and-test/**"

jobs:
  build-test:
    runs-on: ubuntu-latest

    defaults:
      run: 
        working-directory: 02-ci-build-and-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker
        run: docker build -t cicd-prod . 

      - name: Run Container 
        run: docker run -d -p 5000:5000 --name prod-container cicd-prod

      - name: Wait for App
        run: sleep 5
      
      - name: Fake Test
        run: echo "All tests passes sucessfully"

