name: Security Test CI/CD Pipeline

on:
  push:
    paths:
      - "02-ci-build/**"
    branches:
      - main
      - dev
    

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 02-ci-build

    env:
      API_KEY: ${{ secrets.API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t cicd-prod .

      - name: Run Container
        run: |
          docker run -d \
            -p 5000:5000 \
            -e API_KEY=$API_KEY \
            --name prod-container \
            cicd-prod

      - name: Wait for app
        run: |
          for i in {1..10}; do
            if curl -s http://localhost:5000; then
              echo "App is up!"
              exit 0
            fi

            echo "Waiting for app..."
            sleep 2
          done

          echo "App failed to start"
          exit 1

      - name: Check if app is running
        run: curl -f http://localhost:5000

      - name: Cleanup Container
        if: always()
        run: |
          docker stop prod-container
          docker rm prod-container