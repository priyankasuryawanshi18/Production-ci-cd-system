name: CI/CD Pipeline

# 1. Define the triggering events
on:
  push:
    paths:
      - '02-ci-build-and-test/**'
    branches: 
      - main
      - dev 
 

jobs:
  # 2. Continuous Integration Job (Runs on PRs and Pushes)
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
    - run: 
      working-directory: 02-ci-build-and-test   #-- only changes in this folder trigger it

    STEPS:
    - name : Checkout code
      uses : actions/checkout@v4           #---   checkout the sourse code

    - name : Build Docker Image
      run : docker build -t cicd-prod .

    - name : Run Container
      run : docker run -d -p 5000:5000 --name prod-container cicd-prod   # This starts a container from the image.
                                                                         # Run in background.,Map host port 5000 to container port 5000.,Names the container.

    - name : Wait for app
      run : sleep 5 
    
    - name : Fake Test
      run : echo " All tests passes sucessfully"

   